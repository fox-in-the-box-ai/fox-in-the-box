# .github/workflows/build-electron.yml
name: Build Electron

on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      signing-environment:
        description: >-
          GitHub Environment to bind the Windows signing job to. The Azure
          federated identity credential is keyed on this environment's subject
          claim, so it must match the environment configured in Entra ID.
          Empty (default) means: produce unsigned build artifacts and skip
          the Azure login + signing steps. release.yml passes "release".
        type: string
        required: false
        default: ''
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # OIDC token for Azure Trusted Signing on Windows builds

jobs:
  build:
    name: Build Electron — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # When signing-environment is set (release.yml call), the matrix jobs
    # bind to that GitHub Environment. The OIDC token GitHub mints then
    # carries `environment:<name>` in its sub claim, which the Azure
    # federated credential matches exactly. Empty value = no environment.
    environment: ${{ inputs.signing-environment }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: fox-windows
            artifact-path: packages/electron/dist/*.exe
          - os: macos-latest
            artifact-name: fox-macos
            artifact-path: |
              packages/electron/dist/*.dmg
              packages/electron/dist/*-mac.zip

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Enable long paths (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          Write-Host "Long paths enabled"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      # macOS/Linux: workspace-aware install at the repo root.
      # Windows: install in packages/electron with npm so node_modules is flat.
      # pnpm's content-addressed store nests deps under
      #   node_modules/.pnpm/<name>@<ver>_<longhash>/...
      # which blows past Windows MAX_PATH (260) for makensis.exe's NSIS include
      # resolver during electron-builder. `--shamefully-hoist` was tried in
      # 4510cc5 and still produced unreachable include paths, so the fallback
      # is intentional. Don't switch back to pnpm here without confirming
      # makensis can resolve every NSIS include from the resulting tree (#42).
      - name: Install dependencies
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cd packages/electron
            npm install
          else
            pnpm install --frozen-lockfile
          fi

      - name: Build Electron app
        working-directory: packages/electron
        shell: bash
        run: pnpm build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Establish Azure auth context via OIDC. Skipped when signing-environment
      # is empty (e.g. push to main, workflow_dispatch without input) — those
      # builds produce unsigned artifacts purely for CI verification and never
      # ship to a release.
      - name: Azure login (OIDC)
        if: runner.os == 'Windows' && inputs.signing-environment != ''
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Sign the NSIS installer in place using Azure Trusted Signing (Icemint LLC
      # certificate profile). Auth comes from the azure/login step above. Same
      # gate as the login step — only signs when bound to the signing environment.
      - name: Sign Windows installer (Azure Trusted Signing)
        if: runner.os == 'Windows' && inputs.signing-environment != ''
        uses: azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: Icemint
          certificate-profile-name: fitb-exe-signing
          files-folder: packages/electron/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30
