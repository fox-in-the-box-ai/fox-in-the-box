[project]
name = "fox-overlay"
version = "0.0.1"
description = "Fox in the Box overlay for hermes-agent and hermes-webui"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0"]

[project.entry-points."hermes_agent.plugins"]
# Discovered by hermes_cli.plugins.PluginManager.discover_and_load via
# importlib.metadata.entry_points(group="hermes_agent.plugins"). Each
# entry-point points at a `register(ctx: PluginContext) -> None` callable
# that hermes-agent invokes once per process at plugin-load time.
fox_overlay = "fox_overlay.agent_plugins:register"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["fox_overlay"]

[tool.coverage.report]
fail_under = 45
show_missing = true
skip_empty = true

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["fox_overlay*"]
