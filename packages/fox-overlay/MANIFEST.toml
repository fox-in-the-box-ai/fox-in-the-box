# Fox overlay inventory — what's overlaid, what's patched, what's removed.
#
# Empty in Phase 1; Phases 2-7 populate the sections below as content moves
# into the overlay. The full categorization scheme is documented in
# docs/architecture/upstream-migration-execution-plan.md §Phase 1 / §1 synthesis.

[static]
# Phase 2 — Fox-only static assets moved out of forks/hermes-webui/static/,
# served via upstream extensions.py at /extensions/<path>.
# Setup wizard files (setup.html/css/js) deferred to Phase 7 (coupled to
# api/onboarding.py's REPO_ROOT / "static" / "setup.html" path access).
# Fox-branded favicons (apple-touch-icon.png + 5 favicon variants) deferred
# to a dedicated future phase (coherent group, handle atomically with
# manifest.json icon refs).
"fox-in-the-box.css" = "fox-only"
"fox-overlay.js" = "fox-only"
"images/fox_avatar_cropped.jpg" = "fox-only"
"fonts/Manrope[wght].woff2" = "fox-only"
"fonts/Sora[wght].woff2" = "fox-only"
"onboarding-preview.js" = "fox-only"
"fallback-polish.js" = "fox-only"
"hostname-prompt.js" = "fox-only"

[python]
# Phase 3 — agent-side overlay. Three monkey-patch modules applied via
# the `hermes_agent.plugins` entry-point group.
# Phase 5 and Phase 6 add webui-side entries below.
#
# mem0_oss relocation deferred: Engineer discovered during Phase 3b PR
# review that upstream's memory-provider discovery is a separate
# directory-scan path (plugins/memory/__init__.py) with its own
# FakePluginContext exposing register_memory_provider — incompatible
# with the standard PluginContext that entry-points use. mem0_oss
# remains a bundled fork plugin until a dedicated future phase
# properly relocates memory providers.
"fox_overlay.agent_plugins" = "fox-only-additive"  # register(ctx) entry-point
"fox_overlay.agent_plugins.fox_overlay_plugin.monkey_patches.runtime_provider" = "fox-only-additive"
"fox_overlay.agent_plugins.fox_overlay_plugin.monkey_patches.auxiliary_client" = "fox-only-additive"
"fox_overlay.agent_plugins.fox_overlay_plugin.monkey_patches.cron_diagnostics" = "fox-only-additive"
"fox_overlay.agent_plugins.fox_overlay_plugin.monkey_patches._helpers" = "fox-only-additive"

# Phase 4 — dispatcher mechanism + bootstrap.
"fox_overlay.dispatch" = "fox-only-additive"  # /api/* dispatcher table called from patched routes.py
"fox_overlay.bootstrap" = "fox-only-additive"  # imported by patched server.py to wire dispatcher

# Phase 5 — additive webui modules. Each claims a /api/<prefix>/ at the
# dispatcher; Phase 5 fork PRs `git rm` the corresponding api/<name>.py
# from forks/hermes-webui and remove the inline routes.py blocks.
"fox_overlay.webui_modules" = "fox-only-additive"
"fox_overlay.webui_modules.ollama" = "fox-only-additive"  # claims /api/ollama/ (was forks/hermes-webui/api/ollama.py)
"fox_overlay.webui_modules.tailscale" = "fox-only-additive"  # claims /api/tailscale/ (was forks/hermes-webui/api/tailscale.py)
"fox_overlay.webui_modules.local_fallback" = "fox-only-additive"  # claims /api/local-fallback/ (was forks/hermes-webui/api/local_fallback.py)
"fox_overlay.webui_modules.models_download" = "fox-only-additive"  # claims /api/local-models (bare + sub-paths) (was forks/hermes-webui/api/models_download.py)
"fox_overlay.webui_modules.hostname" = "fox-only-additive"  # claims /api/settings/hostname (bare + /dismiss-prompt) (was forks/hermes-webui/api/hostname.py)

# Phase 6 — webui mid-file monkey-patches. Fork files are restored to
# virgin upstream content; these modules re-apply Fox behavior at runtime
# via inspect.getsource + anchored textual substitution. Anchor drift
# fails fast at boot — Phase 9 nightly upstream-watch catches it earlier.
"fox_overlay.webui_patches" = "fox-only-additive"  # apply_all() called from bootstrap
"fox_overlay.webui_patches._helpers" = "fox-only-additive"  # substitute_function (webui-side; mirror of agent_plugins helper)
"fox_overlay.webui_patches.providers" = "fox-only-additive"  # patches api.providers.set_provider_key — adds gateway hot-reload
