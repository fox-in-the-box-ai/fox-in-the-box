appId: io.foxinthebox.desktop
productName: Fox in the Box
copyright: "Copyright © 2024 Fox in the Box AI"

# Skip native module rebuild — no native modules need rebuilding for the target platform
# (cpu-features via ssh2/dockerode fails on Windows with pnpm due to .cjs invocation issue)
npmRebuild: false

directories:
  output: dist

files:
  - src/**/*
  - assets/**/*
  - package.json

icon: assets/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "fox-in-the-box-setup-${version}-${arch}.exe"
  # Avoid winCodeSign extract on machines without symlink privilege (dylib symlinks in cache).
  # Release builds with a cert should omit this or set WIN_CSC_* and sign as usual.
  signAndEditExecutable: false
  # Code signing: set WIN_CSC_LINK (path/URL to .pfx) and WIN_CSC_KEY_PASSWORD in CI
  # electron-builder picks these up automatically when present

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: "fox-in-the-box-${version}-${arch}-mac.dmg"
  # Code signing: set APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_ID env vars in CI
  # identity is auto-detected from keychain when env vars are present
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
dmg:
  sign: false   # signing is done via notarytool after build

# Linux desktop installers (snap/AppImage) are not shipped; install.sh + Docker is the path.
# Unpacked "dir" is enough to validate the app on Linux. Scoped package "name" still needs
# explicit executableName for a sane binary in dist/linux-unpacked.
linux:
  category: Utility
  executableName: fox-in-the-box
  target:
    - dir

publish:
  provider: github
  owner: fox-in-the-box-ai
  repo: fox-in-the-box
  releaseType: release
