# .github/workflows/build-electron.yml
name: Build Electron

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    name: Build Electron — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: fox-windows
            artifact-path: packages/electron/dist/*.exe
          - os: macos-latest
            artifact-name: fox-macos
            artifact-path: packages/electron/dist/*.zip

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Windows: enable long paths in git and OS (pnpm hashed store paths exceed MAX_PATH)
      - name: Enable long paths (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          Write-Host "Long paths enabled"

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # Windows: hoist node_modules to avoid deeply-nested pnpm store paths
      # that cause makensis.exe to fail with !include path-too-long errors
      - name: Install dependencies (Windows — hoisted)
        if: runner.os == 'Windows'
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Install dependencies (non-Windows)
        if: runner.os != 'Windows'
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        working-directory: packages/electron
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-path }}
          generate_release_notes: false   # release.yml owns release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
