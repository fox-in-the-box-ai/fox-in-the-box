# hermes.yaml — default Hermes agent configuration
# Copied to /data/config/hermes.yaml on first container run.
# Edit this file to customise Hermes behaviour.

storage:
  type: local
  path: /data/data/hermes

server:
  host: 0.0.0.0
  port: 8787

logging:
  level: info
  file: /data/logs/hermes.log
