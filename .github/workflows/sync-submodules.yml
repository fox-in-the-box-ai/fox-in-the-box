name: Sync Submodules to Latest

# Triggered when forks/hermes-webui or forks/hermes-agent push to their default
# branch. Opens a PR that bumps the submodule pointer in this repo. Direct
# pushes to main are rejected by branch protection ("Changes must be made
# through a pull request"), so the workflow opens a PR for human review and
# CI to run, instead of trying to push to main itself.

on:
  repository_dispatch:
    types: [hermes-webui-updated, hermes-agent-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest remote branches
        id: update
        run: |
          git submodule update --remote
          if git diff --quiet HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No submodule pointer changes — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat HEAD
          fi

      # Open (or update) a single rolling PR rather than direct-pushing to
      # main. peter-evans/create-pull-request handles the branch creation,
      # the diff stamping, and the rebase if the branch already exists.
      - name: Open / update sync PR
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump submodules to latest remote"
          title: "chore: bump submodules to latest remote"
          body: |
            Auto-generated by `sync-submodules.yml` after a push to a
            submodule's default branch.

            Review the diff to confirm the new submodule commits are intended
            (no unexpected upstream merges, secrets, etc.), then merge as a
            normal PR. CI runs against this branch like any other change.
          branch: chore/sync-submodules
          delete-branch: true
          base: main
