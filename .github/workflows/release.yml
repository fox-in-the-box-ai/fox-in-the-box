# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wait-for-container:
    name: Wait — build-container.yml
    uses: ./.github/workflows/build-container.yml
    permissions:
      contents: read
      packages: write

  wait-for-electron:
    name: Wait — build-electron.yml
    uses: ./.github/workflows/build-electron.yml
    permissions:
      contents: write
      packages: write
      id-token: write   # OIDC token for Azure Trusted Signing — must be granted at the caller, not just declared in the called workflow
    secrets: inherit
    with:
      # Binds the Windows matrix job to this GitHub Environment so its OIDC
      # token's sub claim is `repo:.../environment:release`, which the Azure
      # federated credential `github-env-release` matches exactly. Removes
      # dependency on tag-name patterns (Azure FICs don't actually wildcard).
      signing-environment: release

  release:
    name: Create GitHub Release
    needs: [wait-for-container, wait-for-electron]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # Pin the released image to the exact bytes that wait-for-container just
      # pushed. Pulling `:latest` would be racy: a concurrent push to main can
      # mutate `:latest` between the build and this step, so the released
      # vX.Y.Z / :stable tags would point at the newer commit's image instead
      # of the tagged one. Pulling `name@sha256:...` removes that window. (#41)
      - name: Re-tag Docker image as versioned and :stable
        env:
          DIGEST: ${{ needs.wait-for-container.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ -z "$DIGEST" ]]; then
            echo "::error::wait-for-container did not produce a digest output."
            exit 1
          fi
          IMG="ghcr.io/fox-in-the-box-ai/cloud"
          docker pull "$IMG@$DIGEST"
          docker tag  "$IMG@$DIGEST" "$IMG:${{ steps.tag.outputs.version }}"
          docker tag  "$IMG@$DIGEST" "$IMG:stable"
          docker push "$IMG:${{ steps.tag.outputs.version }}"
          docker push "$IMG:stable"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: fox-windows
          path: release-artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: fox-macos
          path: release-artifacts/macos

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_BARE="${VERSION#v}"
          awk "/^## \[${VERSION_BARE}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "::error::CHANGELOG.md has no entry for [${VERSION_BARE}] — refusing to publish a release with empty body."
            exit 1
          fi
          echo "notes_path=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_path }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/windows/*.exe
            release-artifacts/macos/*.dmg
            release-artifacts/macos/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
