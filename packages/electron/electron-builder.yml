appId: io.foxinthebox.desktop
productName: Fox in the box
executableName: FoxInTheBox
copyright: "Copyright © 2024 Vulpy, Inc."

npmRebuild: false

directories:
  output: dist

files:
  - src/**/*
  - assets/**/*
  - package.json

icon: assets/icon.png

win:
  icon: assets/icon.ico
  publisherName: Vulpy, Inc.
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "fox-in-the-box-setup-${arch}.exe"
  signAndEditExecutable: false

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  uninstallDisplayName: Fox in the box
  shortcutName: Fox in the box
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  include: build/installer.nsh

mac:
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "fox-in-the-box-${arch}-mac.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

linux:
  category: Utility
  executableName: fox-in-the-box
  target:
    - dir

publish:
  provider: github
  owner: fox-in-the-box-ai
  repo: fox-in-the-box
  releaseType: release
