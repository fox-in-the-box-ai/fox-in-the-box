# .github/workflows/build-electron.yml
name: Build Electron

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # OIDC token for Azure Trusted Signing on Windows builds

jobs:
  build:
    name: Build Electron — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: fox-windows
            artifact-path: packages/electron/dist/*.exe
          - os: macos-latest
            artifact-name: fox-macos
            artifact-path: |
              packages/electron/dist/*.dmg
              packages/electron/dist/*-mac.zip

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable long paths (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          Write-Host "Long paths enabled"

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cd packages/electron
            npm install
          else
            pnpm install --frozen-lockfile
          fi

      - name: Build Electron app
        working-directory: packages/electron
        shell: bash
        run: pnpm build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Establish Azure auth context via OIDC. The signing action below picks up
      # credentials from the active Azure session rather than re-authenticating
      # itself; without this step, the signing step's inline OIDC path fails to
      # complete the token exchange against the Trusted Signing endpoint.
      - name: Azure login (OIDC)
        if: runner.os == 'Windows'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Sign the NSIS installer in place using Azure Trusted Signing (Icemint LLC
      # certificate profile). Auth comes from the azure/login step above. Runs
      # only on Windows; the already-signed *.exe is what's picked up by the next
      # Upload step, so release.yml downloads and ships a signed installer.
      - name: Sign Windows installer (Azure Trusted Signing)
        if: runner.os == 'Windows'
        uses: azure/artifact-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: Icemint
          certificate-profile-name: fitb-exe-signing
          files-folder: packages/electron/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30
