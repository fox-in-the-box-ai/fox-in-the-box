name: Electron Smoke

on:
  pull_request:
    paths:
      - 'packages/electron/**'
      - 'tests/electron/**'
      - '.github/workflows/electron-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    name: Electron smoke — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Run Electron startup smoke tests
        shell: bash
        run: pnpm --filter @fox-in-the-box/electron test
