name: Build Container Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./packages/integration/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ghcr.io/fox-in-the-box-ai/cloud:latest
          ghcr.io/fox-in-the-box-ai/cloud:${{ github.sha }}
          ${{ github.event_name == 'push' && contains(github.ref, 'tags') && format('ghcr.io/fox-in-the-box-ai/cloud:{0}', github.ref_name) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
